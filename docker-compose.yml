services:

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    environment:
      - BACKEND_PROTOCOL=http
      - BACKEND_URL=backend:8000
      - FRONTEND_PROTOCOL=http
      - FRONTEND_URL=frontend:3000
      - AZURE_BLOB_DOMAIN=${AZURE_BLOB_DOMAIN:-}
      - DNS_RESOLVER=${DNS_RESOLVER:-127.0.0.11}
    ports:
      - "80:80"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION}
      - AZURE_MODELS_CONFIG=${AZURE_MODELS_CONFIG:-}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - DEFAULT_LLM_PROVIDER=${DEFAULT_LLM_PROVIDER:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GOOGLE_MODEL=${GOOGLE_MODEL:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - MISTRAL_MODEL=${MISTRAL_MODEL:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-hashing}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-}
      - AZURE_EMBEDDING_DEPLOYMENT=${AZURE_EMBEDDING_DEPLOYMENT:-}
      - AZURE_EMBEDDING_MODEL=${AZURE_EMBEDDING_MODEL:-}
      - USE_AZURE_STORAGE=${USE_AZURE_STORAGE:-false}
      - AZURE_CONN_STRING=${AZURE_CONN_STRING:-}
      - AZURE_CONTAINER=${AZURE_CONTAINER:-data}
      - AZURE_SAS_EXPIRY_HOURS=${AZURE_SAS_EXPIRY_HOURS:-24}
      - USE_OGCAPI_STORAGE=${USE_OGCAPI_STORAGE:-false}
      - OGCAPI_BASE_URL=${OGCAPI_BASE_URL:-}
      - OGCAPI_PUBLIC_BASE_URL=${OGCAPI_PUBLIC_BASE_URL:-}
      - OGCAPI_TIMEOUT_SECONDS=${OGCAPI_TIMEOUT_SECONDS:-30}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL}
      - BASE_URL=${BASE_URL}
      - AUTH_ENABLED=${AUTH_ENABLED:-true}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
      - OIDC_PROVIDERS=${OIDC_PROVIDERS}
      - OIDC_GOOGLE_ISSUER=${OIDC_GOOGLE_ISSUER}
      - OIDC_GOOGLE_CLIENT_ID=${OIDC_GOOGLE_CLIENT_ID}
      - OIDC_GOOGLE_CLIENT_SECRET=${OIDC_GOOGLE_CLIENT_SECRET}
      - OIDC_NEPHELE_ISSUER=${OIDC_NEPHELE_ISSUER}
      - OIDC_NEPHELE_CLIENT_ID=${OIDC_NEPHELE_CLIENT_ID}
      - OIDC_NEPHELE_CLIENT_SECRET=${OIDC_NEPHELE_CLIENT_SECRET}
      - MESSAGE_WINDOW_SIZE=${MESSAGE_WINDOW_SIZE:-20}
      - MESSAGE_MANAGEMENT_MODE=${MESSAGE_MANAGEMENT_MODE:-summarize}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-false}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
      - NEXT_PUBLIC_API_UPLOAD_URL=${NEXT_PUBLIC_API_UPLOAD_URL}
      - RUNTIME_ENV_PATH=/app/runtime-env/runtime-env.js
    ports:
      - "3000:3000"

  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
  backend-data:
  backend-uploads:
